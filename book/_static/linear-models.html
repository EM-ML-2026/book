<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linear Models Widget</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --c-truth: #111111;
      --c-data: #0076c2;
      --c-pred: #ec6842;
      --c-validation: #6f1d77;
      --c-grid: #d9dee5;
      --c-axis: #5c6570;
      --c-border: #dde3ea;
      --c-muted: #5f6b7a;
      --c-surface: #ffffff;
      --c-surface-soft: #f7f9fb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1b1f24;
      background: var(--c-surface);
    }

    .widget-shell {
      width: 100%;
      max-width: 100%;
      padding: 12px;
      margin: 0 auto;
      background: var(--c-surface);
    }

    .widget-card {
      width: 100%;
      border: 1px solid var(--c-border);
      border-radius: 12px;
      background: var(--c-surface);
      box-shadow: 0 1px 3px rgba(12, 35, 64, 0.06);
      overflow: hidden;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(150px, 190px) 1fr 64px;
      gap: 10px 12px;
      padding: 12px 14px 8px;
      align-items: center;
      background: var(--c-surface-soft);
      border-bottom: 1px solid #edf1f5;
    }

    .control-label {
      font-size: 0.94rem;
      color: #243140;
    }

    .control-value {
      text-align: right;
      color: var(--c-muted);
      font-variant-numeric: tabular-nums;
      font-size: 0.84rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--c-data);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 14px;
      background: var(--c-surface-soft);
      border-bottom: 1px solid #edf1f5;
    }

    .button-row.is-hidden {
      display: none;
    }

    button {
      border: 1px solid #cfd7e3;
      background: #ffffff;
      color: #243140;
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 0.86rem;
      line-height: 1.2;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }

    button:hover {
      background: #f5f8fc;
      border-color: #b9c7d8;
    }

    button:active { transform: translateY(1px); }

    button.is-active {
      background: #eef5fb;
      border-color: #7cb3df;
      color: #0f4b75;
      font-weight: 600;
    }

    .chart-panel {
      padding: 10px;
      background: #ffffff;
    }

    .chart-frame {
      width: 100%;
      border: 1px solid var(--c-border);
      border-radius: 10px;
      overflow: hidden;
      background: #ffffff;
    }

    .chart-frame svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .axis path,
    .axis line {
      stroke: var(--c-axis);
    }

    .grid line {
      stroke: var(--c-grid);
      stroke-opacity: 0.85;
    }

    .grid path {
      display: none;
    }

    .legend text,
    .axis text {
      font-family: inherit;
    }

    .legend text {
      font-size: 12px;
      fill: #243140;
    }

    .axis text {
      font-size: 12px;
      fill: #44505d;
    }

    @media (max-width: 640px) {
      .widget-shell { padding: 8px; }
      .controls {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .control-value {
        text-align: left;
        margin-top: -4px;
        margin-bottom: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="widget-shell">
    <div class="widget-card">
      <div class="controls" id="controls"></div>
      <div class="button-row" id="buttons"></div>
      <div class="chart-panel">
        <div class="chart-frame" id="main-frame"></div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const d3v = window.d3;
      if (!d3v) return;

      const params = new URLSearchParams(window.location.search);
      const mode = (params.get('mode') || 'polynomial').toLowerCase();
      const MODES = {
        polynomial: {
          xMin: -1,
          xMax: 2 * Math.PI + 1,
          dataMin: 0,
          dataMax: 2 * Math.PI,
          pointCount: 1000,
          heightRatio: 0.60,
          minHeight: 420,
          controls: [
            { key: 'epsilon', label: 'Noise (ε)', min: 0, max: 1, step: 0.01, format: (v) => formatFixed(v, 2) },
            { key: 'degree', label: 'Degree (p)', min: 1, max: 30, step: 1, integer: true, format: (v) => `${Math.round(v)}` },
            { key: 'N', label: 'Training size (N)', min: 1, max: 1000, step: 1, integer: true, format: (v) => `${Math.round(v)}` },
            { key: 'freq', label: 'Frequency (freq)', min: 0.125, max: 8, step: 0.001, format: (v) => formatTrimmed(v, 3) }
          ],
          defaults: { epsilon: 0.7, degree: 1, N: 100, freq: 1, seed: 0, showTruth: true },
          buttons: ['truth', 'seed', 'reset'],
          legend: (state) => {
            const items = [];
            if (state.showTruth) items.push({ label: 'Ground truth f(x)', color: getCSS('--c-truth'), type: 'line' });
            items.push(
              { label: 'Training data (x,t)', color: getCSS('--c-data'), type: 'cross' },
              { label: `Prediction y(x), p=${state.degree}`, color: getCSS('--c-pred'), type: 'line' }
            );
            return items;
          },
          compute: computePolynomialState
        },
        regularization: {
          xMin: 0,
          xMax: 2 * Math.PI,
          dataMin: 0,
          dataMax: 2 * Math.PI,
          pointCount: 1000,
          heightRatio: 0.58,
          minHeight: 400,
          controls: [
            { key: 'lam', label: 'Reg. param. (λ)', min: 0, max: 1, step: 0.001, format: (v) => formatTrimmed(v, 3) },
            { key: 'N', label: 'Dataset (N)', min: 10, max: 100, step: 1, integer: true, format: (v) => `${Math.round(v)}` },
            { key: 'M_radial', label: 'Num. basis (M)', min: 2, max: 20, step: 1, integer: true, format: (v) => `${Math.round(v)}` }
          ],
          defaults: { lam: 0, N: 10, M_radial: 20, epsilon: 0.5, freq: 1, l_radial: 0.5, seed: 0, showTruth: true },
          buttons: [],
          legend: () => [
            { label: 'Ground truth f(x)', color: getCSS('--c-truth'), type: 'line' },
            { label: 'Training data (x,t)', color: getCSS('--c-data'), type: 'cross' },
            { label: 'Prediction y(x)', color: getCSS('--c-pred'), type: 'line' }
          ],
          compute: computeRegularizationState
        }
      };

      const config = MODES[mode] || MODES.polynomial;
      const state = { ...config.defaults };
      const constants = {
        xPred: d3v.range(config.pointCount).map((i) => config.xMin + (config.xMax - config.xMin) * i / (config.pointCount - 1)),
        colors: {
          truth: getCSS('--c-truth'),
          data: getCSS('--c-data'),
          pred: getCSS('--c-pred')
        }
      };

      const controlsEl = d3v.select('#controls');
      const buttonsEl = d3v.select('#buttons');
      const controlMap = new Map();

      config.controls.forEach(addControl);
      addButtons();
      if (!config.buttons.length) buttonsEl.classed('is-hidden', true);

      const mainFrame = d3v.select('#main-frame');
      const mainSvg = mainFrame.append('svg');
      const root = mainSvg.append('g');
      const gridX = root.append('g').attr('class', 'grid');
      const gridY = root.append('g').attr('class', 'grid');
      const axisX = root.append('g').attr('class', 'axis');
      const axisY = root.append('g').attr('class', 'axis');
      const truthPath = root.append('path').attr('fill', 'none').attr('stroke', constants.colors.truth).attr('stroke-width', 2.2);
      const predPath = root.append('path').attr('fill', 'none').attr('stroke', constants.colors.pred).attr('stroke-width', 2.3);
      const dataGroup = root.append('g');
      const legendLayer = mainSvg.append('g').attr('class', 'legend');
      const axisLabelX = mainSvg.append('text').attr('text-anchor', 'middle').attr('fill', '#243140');
      const axisLabelY = mainSvg.append('text').attr('text-anchor', 'middle').attr('fill', '#243140');

      function addControl(spec) {
        controlsEl.append('label').attr('class', 'control-label').attr('for', `control-${spec.key}`).text(spec.label);
        const input = controlsEl.append('input')
          .attr('id', `control-${spec.key}`)
          .attr('type', 'range')
          .attr('min', spec.min)
          .attr('max', spec.max)
          .attr('step', spec.step)
          .property('value', state[spec.key]);
        const value = controlsEl.append('div').attr('class', 'control-value').text(spec.format(state[spec.key]));
        input.on('input', (event) => {
          let next = +event.target.value;
          if (spec.integer) next = Math.round(next);
          state[spec.key] = next;
          value.text(spec.format(next));
          render();
        });
        controlMap.set(spec.key, { input, value, spec });
      }

      function addButtons() {
        config.buttons.forEach((key) => {
          if (key === 'truth') {
            addButton('truth', 'Hide truth', () => {
              state.showTruth = !state.showTruth;
              syncButtons();
              render();
            });
          } else if (key === 'seed') {
            addButton('seed', 'New seed', () => {
              state.seed += 1;
              render();
            });
          } else if (key === 'reset') {
            addButton('reset', 'Reset', () => {
              Object.assign(state, config.defaults);
              controlMap.forEach(({ input, value, spec }, controlKey) => {
                input.property('value', config.defaults[controlKey]);
                value.text(spec.format(config.defaults[controlKey]));
              });
              syncButtons();
              render();
            });
          }
        });
        syncButtons();
      }

      function addButton(key, label, handler) {
        buttonsEl.append('button')
          .attr('type', 'button')
          .attr('data-key', key)
          .text(label)
          .on('click', handler);
      }

      function syncButtons() {
        buttonsEl.selectAll('button')
          .classed('is-active', function() {
            return this.getAttribute('data-key') === 'truth' ? state.showTruth : false;
          })
          .text(function() {
            return this.getAttribute('data-key') === 'truth'
              ? (state.showTruth ? 'Hide truth' : 'Show truth')
              : this.textContent;
          });
      }

      function render() {
        const frameWidth = mainFrame.node().clientWidth || document.body.clientWidth || 800;
        const chartHeight = Math.max(config.minHeight, Math.round(frameWidth * config.heightRatio));
        const margin = { top: 20, right: 14, bottom: 58, left: 50 };
        const innerWidth = Math.max(140, frameWidth - margin.left - margin.right);
        const innerHeight = Math.max(220, chartHeight - margin.top - margin.bottom);

        mainSvg.attr('viewBox', `0 0 ${frameWidth} ${chartHeight}`);
        root.attr('transform', `translate(${margin.left},${margin.top})`);
        axisX.attr('transform', `translate(0,${innerHeight})`);

        const dataset = config.compute(state, constants.xPred, config);
        const yValues = [...dataset.yTruth, ...dataset.yPred, ...dataset.yTrain];
        const yMin = d3v.min(yValues);
        const yMax = d3v.max(yValues);
        const yPad = Math.max(0.12 * ((yMax - yMin) || 1), 0.12);

        const sx = d3v.scaleLinear().domain([config.xMin, config.xMax]).range([0, innerWidth]);
        const sy = d3v.scaleLinear().domain([yMin - yPad, yMax + yPad]).range([innerHeight, 0]);
        const line = d3v.line().x((d) => sx(d.x)).y((d) => sy(d.y));

        gridX.call(d3v.axisBottom(sx).ticks(7).tickSize(-innerHeight).tickFormat(''))
          .attr('transform', `translate(0,${innerHeight})`);
        gridY.call(d3v.axisLeft(sy).ticks(6).tickSize(-innerWidth).tickFormat(''));
        axisX.call(d3v.axisBottom(sx).ticks(7));
        axisY.call(d3v.axisLeft(sy).ticks(6));

        truthPath
          .style('display', state.showTruth ? null : 'none')
          .datum(constants.xPred.map((x, i) => ({ x, y: dataset.yTruth[i] })))
          .attr('d', line);

        predPath
          .datum(constants.xPred.map((x, i) => ({ x, y: dataset.yPred[i] })))
          .attr('d', line);

        drawCrossGroup(dataGroup, dataset.xTrain, dataset.yTrain, constants.colors.data, sx, sy, 4, 1.8);
        drawLegend(frameWidth, chartHeight, config.legend(state));

        axisLabelX.attr('x', margin.left + innerWidth / 2).attr('y', chartHeight - 18).text('x');
        axisLabelY.attr('transform', `translate(18 ${margin.top + innerHeight / 2}) rotate(-90)`).text('t');
      }

      function drawLegend(width, height, items) {
        legendLayer.selectAll('*').remove();
        const rowLimit = width - 18;
        let cursorX = 14;
        let row = 0;
        items.forEach((item) => {
          const itemWidth = Math.max(120, item.label.length * 6.4 + 42);
          if (cursorX + itemWidth > rowLimit) {
            cursorX = 14;
            row += 1;
          }
          const y = height - 18 - row * 18;
          const group = legendLayer.append('g').attr('transform', `translate(${cursorX},${y})`);
          if (item.type === 'line') {
            group.append('line').attr('x1', 0).attr('x2', 22).attr('y1', 0).attr('y2', 0).attr('stroke', item.color).attr('stroke-width', 2.2);
          } else if (item.type === 'cross') {
            group.append('path').attr('d', 'M 3 -4 L 11 4 M 3 4 L 11 -4').attr('stroke', item.color).attr('stroke-width', 2).attr('fill', 'none');
          }
          group.append('text').attr('x', 28).attr('y', 4).text(item.label);
          cursorX += itemWidth;
        });
      }

      function drawCrossGroup(group, xs, ys, color, sx, sy, radius, strokeWidth) {
        const data = xs.map((x, i) => ({ x, y: ys[i] }));
        group.selectAll('path')
          .data(data)
          .join(
            (enter) => enter.append('path').attr('fill', 'none'),
            (update) => update,
            (exit) => exit.remove()
          )
          .attr('stroke', color)
          .attr('stroke-width', strokeWidth)
          .attr('d', (d) => {
            const px = sx(d.x);
            const py = sy(d.y);
            return `M ${px - radius} ${py - radius} L ${px + radius} ${py + radius} M ${px - radius} ${py + radius} L ${px + radius} ${py - radius}`;
          });
      }

      function computePolynomialState(state, xPred, cfg) {
        const xTrain = linspace(cfg.dataMin, cfg.dataMax, state.N);
        const rng = mulberry32((state.seed >>> 0) + 1);
        const yTrain = xTrain.map((x) => fTruth(x, state.freq) + state.epsilon * randn(rng));
        const yPred = predictLinearModel(xTrain, yTrain, xPred, (x) => polynomialBasis(x, state.degree), 0);
        const yTruth = xPred.map((x) => fTruth(x, state.freq));
        return { xTrain, yTrain, yPred, yTruth };
      }

      function computeRegularizationState(state, xPred, cfg) {
        const xTrain = linspace(cfg.dataMin, cfg.dataMax, state.N);
        const rng = mulberry32((state.seed >>> 0) + 1);
        const yTrain = xTrain.map((x) => fTruth(x, state.freq) + state.epsilon * randn(rng));
        const yPred = predictLinearModel(
          xTrain,
          yTrain,
          xPred,
          (x) => radialBasis(x, state.M_radial, state.l_radial),
          state.lam
        );
        const yTruth = xPred.map((x) => fTruth(x, state.freq));
        return { xTrain, yTrain, yPred, yTruth };
      }

      function predictLinearModel(xTrain, yTrain, xPred, basisFn, lam) {
        const xScaler = fitStandardScaler(xTrain);
        const yScaler = fitStandardScaler(yTrain);
        const xTrainScaled = transformStandardScaler(xTrain, xScaler);
        const yTrainScaled = transformStandardScaler(yTrain, yScaler);
        const xPredScaled = transformStandardScaler(xPred, xScaler);

        const Phi = xTrainScaled.map((x) => basisFn(x));
        const PhiPred = xPredScaled.map((x) => basisFn(x));
        const normalLeft = multiplyMatrices(transpose(Phi), Phi);
        const normalRight = multiplyMatrixVector(transpose(Phi), yTrainScaled);

        if (lam > 0) {
          for (let i = 0; i < normalLeft.length; i += 1) {
            if (i !== 0) normalLeft[i][i] += lam;
          }
        }

        const weights = solveLinearSystem(normalLeft, normalRight);
        const yPredScaled = multiplyMatrixVector(PhiPred, weights);
        return inverseTransformStandardScaler(yPredScaled, yScaler);
      }

      function polynomialBasis(x, degree) {
        const row = new Array(degree + 1);
        let value = 1;
        for (let i = 0; i <= degree; i += 1) {
          row[i] = value;
          value *= x;
        }
        return row;
      }

      function radialBasis(x, count, lengthScale) {
        const mu = linspace(-2, 2, count);
        return mu.map((center) => Math.exp(-0.5 * ((x - center) ** 2) / (lengthScale ** 2)));
      }

      function fitStandardScaler(values) {
        const mean = d3v.mean(values);
        const variance = d3v.mean(values.map((v) => (v - mean) ** 2));
        const scale = Math.sqrt(variance) || 1;
        return { mean, scale };
      }

      function transformStandardScaler(values, scaler) {
        return values.map((v) => (v - scaler.mean) / scaler.scale);
      }

      function inverseTransformStandardScaler(values, scaler) {
        return values.map((v) => v * scaler.scale + scaler.mean);
      }

      function transpose(matrix) {
        return matrix[0].map((_, col) => matrix.map((row) => row[col]));
      }

      function multiplyMatrices(a, b) {
        return a.map((row) => b[0].map((_, j) => row.reduce((sum, value, i) => sum + value * b[i][j], 0)));
      }

      function multiplyMatrixVector(matrix, vector) {
        return matrix.map((row) => row.reduce((sum, value, i) => sum + value * vector[i], 0));
      }

      function solveLinearSystem(matrix, vector) {
        const n = matrix.length;
        const attempt = (jitter) => {
          const a = matrix.map((row, i) => row.map((value, j) => value + (i === j ? jitter : 0)));
          const b = vector.slice();
          for (let col = 0; col < n; col += 1) {
            let pivotRow = col;
            let pivotValue = Math.abs(a[col][col]);
            for (let row = col + 1; row < n; row += 1) {
              const candidate = Math.abs(a[row][col]);
              if (candidate > pivotValue) {
                pivotValue = candidate;
                pivotRow = row;
              }
            }
            if (pivotValue < 1e-10) return null;
            if (pivotRow !== col) {
              [a[col], a[pivotRow]] = [a[pivotRow], a[col]];
              [b[col], b[pivotRow]] = [b[pivotRow], b[col]];
            }
            const pivot = a[col][col];
            for (let row = col + 1; row < n; row += 1) {
              const factor = a[row][col] / pivot;
              if (!Number.isFinite(factor)) return null;
              for (let j = col; j < n; j += 1) a[row][j] -= factor * a[col][j];
              b[row] -= factor * b[col];
            }
          }
          const x = new Array(n).fill(0);
          for (let row = n - 1; row >= 0; row -= 1) {
            let sum = b[row];
            for (let col = row + 1; col < n; col += 1) sum -= a[row][col] * x[col];
            if (Math.abs(a[row][row]) < 1e-12) return null;
            x[row] = sum / a[row][row];
          }
          return x;
        };

        return attempt(0) || attempt(1e-10) || attempt(1e-8) || new Array(n).fill(0);
      }

      function linspace(start, stop, count) {
        if (count <= 1) return [start];
        return d3v.range(count).map((i) => start + (stop - start) * i / (count - 1));
      }

      function fTruth(x, freq) {
        return Math.sin(freq * x);
      }

      function mulberry32(a) {
        return function() {
          let t = (a += 0x6D2B79F5);
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function randn(rng) {
        let u = 0;
        let v = 0;
        while (u === 0) u = rng();
        while (v === 0) v = rng();
        return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
      }

      function formatFixed(value, digits) {
        return Number(value).toFixed(digits);
      }

      function formatTrimmed(value, digits) {
        return Number(value).toFixed(digits).replace(/\.0+$/, '').replace(/(\.\d*?)0+$/, '$1');
      }

      function getCSS(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      }

      new ResizeObserver(() => render()).observe(document.body);
      render();
    })();
  </script>
</body>
</html>
