<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kNN Interactive Widget</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --c-truth: #111;
      --c-data: #1f77b4;
      --c-pred: #ff7f0e;
      --c-nei: #2ca02c;
      --c-grid: #d6d6d6;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #222;
      background: #fff;
    }
    .wrap {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
    }
    .controls {
      display: grid;
      grid-template-columns: 130px 1fr 56px;
      gap: 8px 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .controls label { font-size: 14px; }
    .controls input[type="range"] { width: 100%; }
    .value { font-variant-numeric: tabular-nums; text-align: right; color: #555; font-size: 13px; }
    .buttons {
      display: flex;
      gap: 8px;
      margin: 8px 0 12px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid #c8c8c8;
      background: #f8f8f8;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #f0f0f0; }
    .chart {
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
    }
    svg { display: block; width: 100%; height: auto; }
    .axis path, .axis line { stroke: #555; }
    .grid line { stroke: var(--c-grid); stroke-opacity: 0.7; }
    .legend { font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap" id="knn-widget">
    <div class="controls" id="controls"></div>
    <div class="buttons">
      <button id="toggleTruth">Hide truth</button>
      <button id="newSeed">New seed</button>
      <button id="reset">Reset</button>
    </div>
    <div class="chart" id="chart"></div>
  </div>

<script>
(() => {
  const d3v = window.d3;
  if (!d3v) return;

  const defaults = { epsilon: 0.7, k: 1, N: 100, freq: 1, probe: 0.5 };
  const state = { ...defaults, seed: 0, showTruth: true };

  const xmin = 0, xmax = 2 * Math.PI;
  const xPred = d3v.range(300).map(i => xmin + (xmax - xmin) * i / 299);

  function fTruth(x, freq) { return Math.sin(x * freq); }

  function mulberry32(a) {
    return function() {
      let t = (a += 0x6d2b79f5);
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function randn(rng) {
    let u = 0, v = 0;
    while (u === 0) u = rng();
    while (v === 0) v = rng();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  function generateData() {
    const rng = mulberry32(state.seed >>> 0);
    const x = d3v.range(state.N).map(i => xmin + (xmax - xmin) * i / (Math.max(1, state.N - 1)));
    const t = x.map(xi => fTruth(xi, state.freq) + state.epsilon * randn(rng));
    return { x, t };
  }

  function knn(xTrain, yTrain, xQ, k) {
    const kk = Math.max(1, Math.min(k, xTrain.length));
    return xQ.map(xq => {
      const idx = d3v.range(xTrain.length).sort((a,b) => Math.abs(xTrain[a]-xq)-Math.abs(xTrain[b]-xq)).slice(0, kk);
      return d3v.mean(idx, i => yTrain[i]);
    });
  }

  function nearestIndices(xTrain, x0, k) {
    const kk = Math.max(1, Math.min(k, xTrain.length));
    return d3v.range(xTrain.length).sort((a,b) => Math.abs(xTrain[a]-x0)-Math.abs(xTrain[b]-x0)).slice(0, kk);
  }

  const controlSpec = [
    {key:'epsilon', label:'Noise (ε)', min:0, max:1, step:0.01, fmt:v=>v.toFixed(2)},
    {key:'k', label:'Neighbors (k)', min:1, max:100, step:1, fmt:v=>`${Math.round(v)}`},
    {key:'N', label:'Training size (N)', min:1, max:1000, step:1, fmt:v=>`${Math.round(v)}`},
    {key:'freq', label:'Frequency (freq)', min:0.125, max:8, step:0.001, fmt:v=>v.toFixed(3)},
    {key:'probe', label:'Probe location', min:0, max:1, step:0.001, fmt:v=>v.toFixed(3)}
  ];

  const controls = d3v.select('#controls');
  const controlMap = {};
  controlSpec.forEach(c => {
    controls.append('label').attr('for', c.key).text(c.label);
    const inp = controls.append('input').attr('id', c.key).attr('type','range')
      .attr('min', c.min).attr('max', c.max).attr('step', c.step).property('value', state[c.key]);
    const val = controls.append('div').attr('class','value').text(c.fmt(state[c.key]));
    inp.on('input', (e) => {
      state[c.key] = +e.target.value;
      if (c.key === 'k' || c.key === 'N') state[c.key] = Math.round(state[c.key]);
      val.text(c.fmt(state[c.key]));
      update();
    });
    controlMap[c.key] = {inp, val, fmt:c.fmt};
  });

  d3v.select('#toggleTruth').on('click', () => {
    state.showTruth = !state.showTruth;
    d3v.select('#toggleTruth').text(state.showTruth ? 'Hide truth' : 'Show truth');
    update();
  });

  d3v.select('#newSeed').on('click', () => { state.seed += 1; update(); });

  d3v.select('#reset').on('click', () => {
    Object.assign(state, defaults, { seed: 0, showTruth: true });
    d3v.select('#toggleTruth').text('Hide truth');
    controlSpec.forEach(c => {
      controlMap[c.key].inp.property('value', state[c.key]);
      controlMap[c.key].val.text(controlMap[c.key].fmt(state[c.key]));
    });
    update();
  });

  const chart = d3v.select('#chart');
  const svg = chart.append('svg');
  const g = svg.append('g');
  const gx = g.append('g').attr('class','axis');
  const gy = g.append('g').attr('class','axis');
  const gridX = g.append('g').attr('class', 'grid');
  const gridY = g.append('g').attr('class', 'grid');

  const truthPath = g.append('path').attr('fill','none').attr('stroke','var(--c-truth)').attr('stroke-width',2);
  const predPath = g.append('path').attr('fill','none').attr('stroke','var(--c-pred)').attr('stroke-width',2);
  const dataG = g.append('g');
  const neiG = g.append('g');
  const probePath = g.append('path').attr('fill','none').attr('stroke','var(--c-nei)').attr('stroke-width',2);

  const legend = svg.append('g').attr('class','legend');

  function drawLegend(width, height) {
    legend.selectAll('*').remove();
    const items = [
      ['Ground truth f(x)', 'var(--c-truth)', 'line'],
      ['Training data (x,t)', 'var(--c-data)', 'cross'],
      ['Prediction y(x), k='+state.k, 'var(--c-pred)', 'line'],
      ['Probe + neighbors', 'var(--c-nei)', 'cross']
    ];
    const y = height - 8;
    let x = 12;
    items.forEach(([label,color,type]) => {
      if (type === 'line') legend.append('line').attr('x1',x).attr('x2',x+20).attr('y1',y).attr('y2',y).attr('stroke',color).attr('stroke-width',2);
      else legend.append('path').attr('d', `M ${x+10} ${y-4} L ${x+10} ${y+4} M ${x+6} ${y} L ${x+14} ${y}`)
        .attr('stroke',color).attr('stroke-width',2);
      legend.append('text').attr('x', x+25).attr('y', y+4).text(label);
      x += Math.max(170, label.length * 6.2 + 42);
    });
  }

  function render() {
    const outerW = chart.node().clientWidth;
    const H = Math.max(460, Math.round(outerW * 0.62));
    const margin = {top: 14, right: 16, bottom: 52, left: 48};
    const W = outerW;
    const iw = W - margin.left - margin.right;
    const ih = H - margin.top - margin.bottom;

    svg.attr('viewBox', `0 0 ${W} ${H}`);
    g.attr('transform', `translate(${margin.left},${margin.top})`);
    gx.attr('transform', `translate(0,${ih})`);

    const {x, t} = generateData();
    const k = Math.min(state.k, x.length);
    const yPred = knn(x, t, xPred, k);
    const yTruth = xPred.map(v => fTruth(v, state.freq));

    const yMin = d3v.min([...t, ...yPred, ...yTruth]);
    const yMax = d3v.max([...t, ...yPred, ...yTruth]);
    const pad = 0.12 * (yMax - yMin || 1);

    const sx = d3v.scaleLinear().domain([xmin, xmax]).range([0, iw]);
    const sy = d3v.scaleLinear().domain([yMin-pad, yMax+pad]).range([ih, 0]);

    gx.call(d3v.axisBottom(sx));
    gy.call(d3v.axisLeft(sy));
    gridX.attr('transform', `translate(0,${ih})`).call(d3v.axisBottom(sx).tickSize(-ih).tickFormat('')).select('.domain').remove();
    gridY.call(d3v.axisLeft(sy).tickSize(-iw).tickFormat('')).select('.domain').remove();

    const line = d3v.line().x(d=>sx(d.x)).y(d=>sy(d.y));

    truthPath.style('display', state.showTruth ? null : 'none')
      .datum(xPred.map((xx,i)=>({x:xx,y:yTruth[i]}))).attr('d', line);
    predPath.datum(xPred.map((xx,i)=>({x:xx,y:yPred[i]}))).attr('d', line);

    const pts = dataG.selectAll('path.dat').data(x.map((xx,i)=>({x:xx,y:t[i]})));
    pts.join(
      enter => enter.append('path').attr('class','dat').attr('stroke','var(--c-data)').attr('stroke-width',1.8),
      update => update,
      exit => exit.remove()
    ).attr('d', d => {
      const px = sx(d.x), py = sy(d.y), r=4;
      return `M ${px-r} ${py-r} L ${px+r} ${py+r} M ${px-r} ${py+r} L ${px+r} ${py-r}`;
    });

    const xProbe = d3v.min(x) + state.probe * (d3v.max(x)-d3v.min(x));
    const idx = nearestIndices(x, xProbe, k);
    const neighPts = idx.map(i => ({x:x[i], y:t[i]}));
    const yProbe = d3v.max(t);

    const np = neiG.selectAll('path.nei').data(neighPts);
    np.join(
      enter => enter.append('path').attr('class','nei').attr('stroke','var(--c-nei)').attr('stroke-width',2).attr('fill','none').attr('opacity',0.7),
      update => update,
      exit => exit.remove()
    ).attr('d', d => {
      const px = sx(d.x), py = sy(d.y), r=5;
      return `M ${px-r} ${py-r} L ${px+r} ${py+r} M ${px-r} ${py+r} L ${px+r} ${py-r}`;
    });

    let interval;
    if (idx.length > 1) {
      const xs = neighPts.map(d=>d.x);
      const x1 = d3v.min(xs), x2 = d3v.max(xs), y = yProbe, dd = 0.1;
      interval = [
        {x:x1,y:y}, {x:x1,y:y-dd}, {x:x1,y:y+dd}, {x:x1,y:y},
        {x:xProbe,y:y}, {x:x2,y:y}, {x:x2,y:y-dd}, {x:x2,y:y+dd}, {x:x2,y:y}
      ];
    } else interval = [{x:xProbe,y:yProbe}];

    probePath.datum(interval).attr('d', line);

    svg.selectAll('.axis-label').data([0]).join('text').attr('class','axis-label')
      .attr('x', margin.left + iw/2).attr('y', H-12).attr('text-anchor','middle').text('x');
    svg.selectAll('.axis-label-y').data([0]).join('text').attr('class','axis-label-y')
      .attr('transform', `translate(16 ${margin.top+ih/2}) rotate(-90)`).attr('text-anchor','middle').text('t');

    drawLegend(W, H);
  }

  function update(){ render(); }
  new ResizeObserver(render).observe(chart.node());
  render();
})();
</script>
</body>
</html>
