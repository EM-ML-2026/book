<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaussian Conditioning</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1f2937;
      --muted: #6b7280;
      --grid: #e5e7eb;
      --accent: #ec6842;
      --line: #0f172a;
      --border: #d1d5db;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 16px 18px;
      box-sizing: border-box;
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 10px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 12px;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }
    .axis path, .axis line {
      stroke: #6b7280;
    }
    .axis text {
      fill: #374151;
      font-size: 12px;
    }
    .grid line {
      stroke: var(--grid);
      stroke-opacity: 0.85;
    }
    .grid path {
      display: none;
    }
    .slider-panel {
      margin-top: 10px;
      display: grid;
      gap: 10px;
    }
    .slider-row {
      display: grid;
      grid-template-columns: 120px 1fr 56px;
      align-items: center;
      gap: 10px;
    }
    .slider-row label {
      font-size: 14px;
    }
    .slider-row input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    .slider-value {
      text-align: right;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }
    .formula {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .cov-readout {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">Gaussian Conditioning</div>
    <div class="subtitle">D3 recreation of the interactive matplotlib widget for a 2D Gaussian with marginal and conditional densities.</div>
    <svg id="chart" viewBox="0 0 920 620" aria-label="Gaussian conditioning interactive plot"></svg>

    <div class="slider-panel">
      <div class="slider-row">
        <label for="xb">x_b</label>
        <input id="xb" type="range" min="-4.52274844" max="3.47725156" step="0.01" value="-0.32542284" />
        <div class="slider-value" id="xb-val"></div>
      </div>
      <div class="slider-row">
        <label for="saa">Σ_aa</label>
        <input id="saa" type="range" min="0.3" max="2.0" step="0.01" value="0.77545885" />
        <div class="slider-value" id="saa-val"></div>
      </div>
      <div class="slider-row">
        <label for="sbb">Σ_bb</label>
        <input id="sbb" type="range" min="0.3" max="2.0" step="0.01" value="0.50362894" />
        <div class="slider-value" id="sbb-val"></div>
      </div>
      <div class="slider-row">
        <label for="rho">ρ_ab</label>
        <input id="rho" type="range" min="-0.95" max="0.95" step="0.01" value="-0.4309" />
        <div class="slider-value" id="rho-val"></div>
      </div>
    </div>

    <div class="formula">Uses μ = [0.1891, -0.5227] and updates Σ<sub>ab</sub> = ρ√(Σ<sub>aa</sub>Σ<sub>bb</sub>) with p(x<sub>a</sub>|x<sub>b</sub>) computed analytically.</div>
    <div class="cov-readout" id="cov-readout"></div>
  </div>

  <script>
    const muA = 0.18905338;
    const muB = -0.52274844;
    const n = 100;

    const xbDomain = [muB - 4, muB + 4];
    const xaDomain = [muA - 4, muA + 4];

    const svg = d3.select('#chart');
    const W = 920, H = 620;

    const leftMargW = 130;
    const centerW = 430;
    const rightCondW = 130;
    const gap = 34;
    const plotH = 420;
    const top = 40;
    const left = 120;
    const mainX = left + leftMargW + gap;
    const mainY = top;
    const rightX = mainX + centerW + gap;

    const xScale = d3.scaleLinear().domain(xbDomain).range([mainX, mainX + centerW]);
    const yScale = d3.scaleLinear().domain(xaDomain).range([mainY + plotH, mainY]);
    const margScale = d3.scaleLinear().domain([1.5, 0]).range([left, left + leftMargW]);
    const condScale = d3.scaleLinear().domain([0, 1.0]).range([rightX, rightX + rightCondW]);

    const xTicks = d3.axisBottom(xScale).ticks(6);
    const yTicks = d3.axisLeft(yScale).ticks(6);
    const yTicksRight = d3.axisRight(yScale).tickValues([]);

    const main = svg.append('g');

    main.append('g')
      .attr('class', 'grid')
      .attr('transform', `translate(0,${mainY + plotH})`)
      .call(d3.axisBottom(xScale).ticks(6).tickSize(-plotH).tickFormat(''));

    main.append('g')
      .attr('class', 'grid')
      .attr('transform', `translate(${mainX},0)`)
      .call(d3.axisLeft(yScale).ticks(6).tickSize(-centerW).tickFormat(''));

    main.append('g').attr('class', 'axis').attr('transform', `translate(0,${mainY + plotH})`).call(xTicks);
    main.append('g').attr('class', 'axis').attr('transform', `translate(${mainX},0)`).call(yTicks);
    main.append('g').attr('class', 'axis').attr('transform', `translate(${mainX + centerW},0)`).call(yTicksRight);

    main.append('text')
      .attr('x', mainX + centerW / 2)
      .attr('y', mainY + plotH + 40)
      .attr('text-anchor', 'middle')
      .style('font-size', '14px')
      .text('x_b');

    main.append('text')
      .attr('x', left + 14)
      .attr('y', mainY + plotH / 2)
      .attr('transform', `rotate(-90, ${left + 14}, ${mainY + plotH / 2})`)
      .attr('text-anchor', 'middle')
      .style('font-size', '14px')
      .text('x_a');

    main.append('text')
      .attr('x', left + leftMargW / 2)
      .attr('y', mainY + plotH + 40)
      .attr('text-anchor', 'middle')
      .style('font-size', '14px')
      .text('p(x_a)');

    main.append('text')
      .attr('x', rightX + rightCondW / 2)
      .attr('y', mainY + plotH + 40)
      .attr('text-anchor', 'middle')
      .style('font-size', '14px')
      .text('p(x_a | x_b)');

    const contourGroup = main.append('g');
    const vline = main.append('line')
      .attr('y1', mainY)
      .attr('y2', mainY + plotH)
      .attr('stroke', '#111827')
      .attr('stroke-width', 1.5);

    const margPath = main.append('path')
      .attr('fill', 'none')
      .attr('stroke', '#ec6842')
      .attr('stroke-width', 2.3);

    const condPath = main.append('path')
      .attr('fill', 'none')
      .attr('stroke', '#ec6842')
      .attr('stroke-width', 2.3);

    const margAxis = main.append('g')
      .attr('class', 'axis')
      .attr('transform', `translate(0,${mainY + plotH})`)
      .call(d3.axisBottom(margScale).tickValues([1.5, 1.0, 0.5, 0]).tickFormat(d3.format('.1f')));

    const condAxis = main.append('g')
      .attr('class', 'axis')
      .attr('transform', `translate(0,${mainY + plotH})`)
      .call(d3.axisBottom(condScale).tickValues([0, 0.5, 1.0]).tickFormat(d3.format('.1f')));

    main.append('g').attr('class', 'axis').attr('transform', `translate(${left + leftMargW},0)`).call(d3.axisRight(yScale).tickValues([]));
    main.append('g').attr('class', 'axis').attr('transform', `translate(${rightX},0)`).call(d3.axisLeft(yScale).tickValues([]));

    const xbInput = document.getElementById('xb');
    const saaInput = document.getElementById('saa');
    const sbbInput = document.getElementById('sbb');
    const rhoInput = document.getElementById('rho');

    const fmt = d3.format('.2f');
    const fmt4 = d3.format('.4f');
    const color = d3.scaleSequential(d3.interpolateTurbo);

    function normalPdf(x, mu, variance) {
      return (1 / Math.sqrt(2 * Math.PI * variance)) * Math.exp(-0.5 * ((x - mu) ** 2) / variance);
    }

    function bivariatePdf(xa, xb, saa, sbb, sab) {
      const da = xa - muA;
      const db = xb - muB;
      const det = saa * sbb - sab * sab;
      const inv00 = sbb / det;
      const inv01 = -sab / det;
      const inv11 = saa / det;
      const quad = da * da * inv00 + 2 * da * db * inv01 + db * db * inv11;
      return Math.exp(-0.5 * quad) / (2 * Math.PI * Math.sqrt(det));
    }

    function update() {
      const xb = +xbInput.value;
      const saa = +saaInput.value;
      const sbb = +sbbInput.value;
      const rho = +rhoInput.value;
      const sab = rho * Math.sqrt(saa * sbb);
      const det = saa * sbb - sab * sab;

      document.getElementById('xb-val').textContent = fmt(xb);
      document.getElementById('saa-val').textContent = fmt(saa);
      document.getElementById('sbb-val').textContent = fmt(sbb);
      document.getElementById('rho-val').textContent = fmt(rho);
      document.getElementById('cov-readout').textContent = `Σ = [[${fmt4(saa)}, ${fmt4(sab)}],\n     [${fmt4(sab)}, ${fmt4(sbb)}]]\nμ_cond = ${fmt4(muA + (sab / sbb) * (xb - muB))},  Σ_cond = ${fmt4(saa - (sab * sab) / sbb)}`;

      const xVals = d3.range(n).map(i => xaDomain[0] + (i / (n - 1)) * (xaDomain[1] - xaDomain[0]));
      const yValsDesc = d3.range(n).map(j => xaDomain[1] - (j / (n - 1)) * (xaDomain[1] - xaDomain[0]));
      const xbVals = d3.range(n).map(i => xbDomain[0] + (i / (n - 1)) * (xbDomain[1] - xbDomain[0]));

      const gridValues = [];
      let minV = Infinity, maxV = -Infinity;
      for (let j = 0; j < n; j++) {
        for (let i = 0; i < n; i++) {
          const val = bivariatePdf(yValsDesc[j], xbVals[i], saa, sbb, sab);
          gridValues.push(val);
          if (val < minV) minV = val;
          if (val > maxV) maxV = val;
        }
      }

      const levels = d3.range(1, 15).map(k => minV + (k / 15) * (maxV - minV));
      color.domain([levels[0], levels[levels.length - 1]]);

      const contours = d3.contours().size([n, n]).thresholds(levels)(gridValues);
      const path = d3.geoPath(d3.geoIdentity().scale(1));

      const sel = contourGroup.selectAll('path').data(contours, d => d.value);
      sel.join(
        enter => enter.append('path')
          .attr('stroke', 'none')
          .attr('opacity', 0.96)
          .attr('transform', `translate(${mainX},${mainY}) scale(${centerW / (n - 1)}, ${plotH / (n - 1)})`)
          .attr('d', path)
          .attr('fill', d => color(d.value)),
        update => update
          .attr('transform', `translate(${mainX},${mainY}) scale(${centerW / (n - 1)}, ${plotH / (n - 1)})`)
          .attr('d', path)
          .attr('fill', d => color(d.value)),
        exit => exit.remove()
      );

      vline.attr('x1', xScale(xb)).attr('x2', xScale(xb));

      const muCond = muA + (sab / sbb) * (xb - muB);
      const varCond = saa - (sab * sab) / sbb;

      const marginalLine = d3.line()
        .x(d => margScale(Math.min(1.5, d.p)))
        .y(d => yScale(d.x));

      const conditionalLine = d3.line()
        .x(d => condScale(Math.min(1.0, d.p)))
        .y(d => yScale(d.x));

      const margData = xVals.map(x => ({ x, p: normalPdf(x, muA, saa) }));
      const condData = xVals.map(x => ({ x, p: normalPdf(x, muCond, varCond) }));

      margPath.attr('d', marginalLine(margData));
      condPath.attr('d', conditionalLine(condData));
    }

    [xbInput, saaInput, sbbInput, rhoInput].forEach(el => el.addEventListener('input', update));
    update();
  </script>
</body>
</html>
