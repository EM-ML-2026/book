<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 16px;
      color: #222;
      background: #fff;
    }
    .container {
      width: 980px;
      max-width: 100%;
    }
    svg {
      overflow: visible;
      display: block;
    }
    .axis path, .axis line {
      stroke: #666;
      shape-rendering: crispEdges;
    }
    .axis text {
      fill: #444;
      font-size: 12px;
    }
    .joint-label, .panel-label {
      font-size: 14px;
    }
    .slider-row {
      display: grid;
      grid-template-columns: 100px 1fr 56px;
      gap: 10px;
      align-items: center;
      margin: 8px 0;
      width: 760px;
      max-width: 100%;
    }
    .slider-row label {
      font-size: 14px;
    }
    .slider-row input[type="range"] {
      width: 100%;
    }
    .value {
      font-variant-numeric: tabular-nums;
      text-align: right;
      color: #444;
    }
    .contour {
      stroke: none;
    }
    .vline {
      stroke: #1f77b4;
      stroke-width: 2;
    }
    .curve {
      fill: none;
      stroke: #ff7f0e;
      stroke-width: 2;
    }
    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }
    .note {
      color: #666;
      font-size: 12px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title"></div>
    <div id="plot"></div>
    <div id="controls"></div>
  </div>

  <script>
    (() => {
      const d3v = window.d3;
      if (!d3v) {
        document.getElementById('plot').innerHTML = '<p style="color:#b00020">D3 failed to load from CDN.</p>';
        return;
      }

      // --- Parameters matching the notebook widget ---
      const mu = [0, 0];
      const lims = [[-4, 4], [-4, 4]]; // x_a on vertical axis, x_b on horizontal axis
      const gridN = 120;
      const contourLevels = 14;

      const state = {
        x_b: 0.0,
        sigma_aa: 1.0,
        sigma_bb: 1.0,
        rho: 0.0
      };

      // --- Layout ---
      const totalWidth = 920;
      const totalHeight = 520;
      const mainLeft = 220;
      const mainTop = 30;
      const jointSize = 420;
      const sideWidth = 110;
      const sideGap = 22;
      const sliderStartY = 500;

      const svg = d3v.select('#plot')
        .append('svg')
        .attr('width', totalWidth)
        .attr('height', totalHeight)
        .attr('viewBox', `0 0 ${totalWidth} ${totalHeight}`);

      const mainX = d3v.scaleLinear().domain(lims[1]).range([mainLeft, mainLeft + jointSize]);
      const mainY = d3v.scaleLinear().domain(lims[0]).range([mainTop + jointSize, mainTop]);

      const leftPanelX = d3v.scaleLinear().domain([1.5, -0.1]).range([mainLeft - sideGap - sideWidth, mainLeft - sideGap]);
      const rightPanelX = d3v.scaleLinear().domain([-0.1, 1.0]).range([mainLeft + jointSize + sideGap, mainLeft + jointSize + sideGap + sideWidth]);
      const sideY = d3v.scaleLinear().domain(lims[0]).range([mainTop + jointSize, mainTop]);

      const color = d3v.scaleSequential(d3v.interpolateMagma);

      const jointLayer = svg.append('g');
      const axesLayer = svg.append('g');
      const leftLayer = svg.append('g');
      const rightLayer = svg.append('g');
      const overlayLayer = svg.append('g');

      // Axes
      axesLayer.append('g')
        .attr('class', 'axis')
        .attr('transform', `translate(0, ${mainTop + jointSize})`)
        .call(d3v.axisBottom(mainX));

      axesLayer.append('g')
        .attr('class', 'axis')
        .attr('transform', `translate(${mainLeft}, 0)`)
        .call(d3v.axisLeft(mainY).tickFormat(''));

      axesLayer.append('g')
        .attr('class', 'axis')
        .attr('transform', `translate(${mainLeft - sideGap}, 0)`)
        .call(d3v.axisRight(sideY));

      axesLayer.append('g')
        .attr('class', 'axis')
        .attr('transform', `translate(${mainLeft + jointSize + sideGap}, 0)`)
        .call(d3v.axisLeft(sideY).tickFormat(''));

      axesLayer.append('text')
        .attr('class', 'joint-label')
        .attr('x', mainLeft + jointSize / 2)
        .attr('y', mainTop + jointSize + 38)
        .attr('text-anchor', 'middle')
        .text('x_b');

      axesLayer.append('text')
        .attr('class', 'panel-label')
        .attr('x', mainLeft - sideGap - sideWidth / 2)
        .attr('y', mainTop + jointSize + 38)
        .attr('text-anchor', 'middle')
        .text('p(x_a)');

      axesLayer.append('text')
        .attr('class', 'panel-label')
        .attr('x', mainLeft + jointSize + sideGap + sideWidth / 2)
        .attr('y', mainTop + jointSize + 38)
        .attr('text-anchor', 'middle')
        .text('p(x_a | x_b)');

      axesLayer.append('text')
        .attr('class', 'panel-label')
        .attr('x', mainLeft - sideGap - sideWidth - 42)
        .attr('y', mainTop + jointSize / 2)
        .attr('transform', `rotate(-90, ${mainLeft - sideGap - sideWidth - 42}, ${mainTop + jointSize / 2})`)
        .attr('text-anchor', 'middle')
        .text('x_a');

      // Background boxes for panels
      [
        [mainLeft, mainTop, jointSize, jointSize],
        [mainLeft - sideGap - sideWidth, mainTop, sideWidth, jointSize],
        [mainLeft + jointSize + sideGap, mainTop, sideWidth, jointSize]
      ].forEach(([x, y, w, h]) => {
        axesLayer.append('rect')
          .attr('x', x)
          .attr('y', y)
          .attr('width', w)
          .attr('height', h)
          .attr('fill', 'none')
          .attr('stroke', '#999');
      });

      const verticalLine = overlayLayer.append('line')
        .attr('class', 'vline')
        .attr('y1', mainTop)
        .attr('y2', mainTop + jointSize);

      const margPath = leftLayer.append('path').attr('class', 'curve');
      const condPath = rightLayer.append('path').attr('class', 'curve');

      function gaussian1D(x, mean, variance) {
        const sigma = Math.sqrt(Math.max(variance, 1e-12));
        const z = (x - mean) / sigma;
        return Math.exp(-0.5 * z * z) / (sigma * Math.sqrt(2 * Math.PI));
      }

      function covariance() {
        const cov = state.rho * Math.sqrt(state.sigma_aa * state.sigma_bb);
        return [
          [state.sigma_aa, cov],
          [cov, state.sigma_bb]
        ];
      }

      function jointPdf(xa, xb) {
        const Sigma = covariance();
        const a = Sigma[0][0], b = Sigma[0][1], d = Sigma[1][1];
        const det = a * d - b * b;
        const inv00 = d / det;
        const inv01 = -b / det;
        const inv11 = a / det;
        const da = xa - mu[0];
        const db = xb - mu[1];
        const quad = inv00 * da * da + 2 * inv01 * da * db + inv11 * db * db;
        return Math.exp(-0.5 * quad) / (2 * Math.PI * Math.sqrt(det));
      }

      function conditionalParams(xb) {
        const Sigma = covariance();
        const sigma_ab = Sigma[0][1];
        const mean = mu[0] + (sigma_ab / Sigma[1][1]) * (xb - mu[1]);
        const variance = Sigma[0][0] - (sigma_ab * sigma_ab) / Sigma[1][1];
        return { mean, variance };
      }

      function buildGridValues() {
        const values = new Array(gridN * gridN);
        let vmax = -Infinity;
        for (let iy = 0; iy < gridN; iy++) {
          const xa = lims[0][0] + (iy / (gridN - 1)) * (lims[0][1] - lims[0][0]);
          for (let ix = 0; ix < gridN; ix++) {
            const xb = lims[1][0] + (ix / (gridN - 1)) * (lims[1][1] - lims[1][0]);
            const v = jointPdf(xa, xb);
            values[iy * gridN + ix] = v;
            if (v > vmax) vmax = v;
          }
        }
        return { values, vmax };
      }

      function contourThresholds(vmax) {
        return d3v.range(1, contourLevels + 1).map(i => (i / (contourLevels + 1)) * vmax);
      }

      function linePath(xs, ys, xScale, yScale) {
        return d3v.line()
          .x((d, i) => xScale(xs[i]))
          .y((d) => yScale(d))(ys);
      }

      function render() {
        const { values, vmax } = buildGridValues();
        const thresholds = contourThresholds(vmax);
        color.domain([0, thresholds[thresholds.length - 1]]);

        const contours = d3v.contours()
          .size([gridN, gridN])
          .thresholds(thresholds)(values);

        const geoPath = d3v.geoPath(
          d3v.geoIdentity().scale(jointSize / (gridN - 1)).translate([mainLeft, mainTop + jointSize]).reflectY(true)
        );

        const contourSel = jointLayer.selectAll('path.contour').data(contours, d => d.value);
        contourSel.join(
          enter => enter.append('path').attr('class', 'contour'),
          update => update,
          exit => exit.remove()
        )
          .attr('d', geoPath)
          .attr('fill', d => color(d.value));

        verticalLine
          .attr('x1', mainX(state.x_b))
          .attr('x2', mainX(state.x_b));

        const ys = d3v.range(240).map(i => lims[0][0] + (i / 239) * (lims[0][1] - lims[0][0]));
        const margXs = ys.map(y => gaussian1D(y, mu[0], state.sigma_aa));
        const cond = conditionalParams(state.x_b);
        const condXs = ys.map(y => gaussian1D(y, cond.mean, cond.variance));

        margPath.attr('d', linePath(margXs, ys, leftPanelX, sideY));
        condPath.attr('d', linePath(condXs, ys, rightPanelX, sideY));
      }

      // Controls
      const controls = d3v.select('#controls');
      const sliderSpecs = [
        { key: 'x_b', label: 'x_b', min: -4, max: 4, step: 0.01 },
        { key: 'sigma_aa', label: 'Σ_aa', min: 0.3, max: 2.0, step: 0.01 },
        { key: 'sigma_bb', label: 'Σ_bb', min: 0.3, max: 2.0, step: 0.01 },
        { key: 'rho', label: 'ρ_ab', min: -0.95, max: 0.95, step: 0.01 }
      ];

      sliderSpecs.forEach(spec => {
        const row = controls.append('div').attr('class', 'slider-row');
        row.append('label').attr('for', spec.key).text(spec.label);
        row.append('input')
          .attr('type', 'range')
          .attr('id', spec.key)
          .attr('min', spec.min)
          .attr('max', spec.max)
          .attr('step', spec.step)
          .attr('value', state[spec.key])
          .on('input', function() {
            state[spec.key] = +this.value;
            d3v.select(`#val-${spec.key}`).text(state[spec.key].toFixed(2));
            render();
          });
        row.append('div')
          .attr('class', 'value')
          .attr('id', `val-${spec.key}`)
          .text(state[spec.key].toFixed(2));
      });

      render();
    })();
  </script>
</body>
</html>
